# Cloud Build config — builds the Docker image and deploys to Cloud Run.
#
# Triggered by a push to main once the GitHub trigger is wired in step 10.
# Until that trigger exists, this file is committed but inert.
#
# The --set-env-vars block below is the single source of truth for the
# Cloud Run env block (same pattern as cloud-run-podcast/cloudbuild.yaml).
# Edit here to change a variable; ad-hoc
#   `gcloud run services update --set-env-vars=...`
# calls REPLACE the entire env list and can silently truncate it.
#
# MCP_ENABLED is now true: the 12 Phase 1 tools are mounted at /mcp/.
# The inert-shell phase (steps 1-11) is complete; step 12 enables the
# transport and smoke-tests it via MCP Inspector against the deployed
# URL.
#
# TODO (follow-up after step 12): replace the default Compute Engine
# service account with a dedicated --service-account=
# ambient-advantage-mcp-runtime@... that has zero IAM permissions.
# Phase 1 reads only public URLs, so a zero-perm SA shrinks the
# attack surface to nothing.

steps:
  # 1. Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ambient-advantage-mcp:$SHORT_SHA'
      - '.'

  # 2. Push the image to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ambient-advantage-mcp:$SHORT_SHA'

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'ambient-advantage-mcp'
      - '--image=northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ambient-advantage-mcp:$SHORT_SHA'
      - '--region=northamerica-northeast2'
      - '--platform=managed'
      - '--quiet'
      - '--allow-unauthenticated'
      - '--port=8080'
      # cpu=1 (not 0.5) because Cloud Run rejects cpu < 1 alongside
      # concurrency > 1, and we want concurrency=80 so the async stack
      # (httpx + asyncio) can multiplex MCP tool calls within an instance.
      # Cost stays effectively zero at idle (scale-to-zero); the bump only
      # matters when actively serving requests.
      - '--cpu=1'
      - '--memory=512Mi'
      - '--min-instances=0'
      - '--max-instances=5'
      - '--concurrency=80'
      - '--set-env-vars=MCP_ENABLED=true,PUBLIC_BASE_BRIEFING=https://briefing.ambient-advantage.ai,PUBLIC_BASE_TAKE=https://take.ambient-advantage.ai,PUBLIC_BASE_PODCAST=https://podcast.ambient-advantage.ai,PUBLIC_BASE_BUILD=https://build.ambient-advantage.ai'

images:
  - 'northamerica-northeast2-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/ambient-advantage-mcp:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY
